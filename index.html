<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Todoリスト</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                font-family: Arial, Sans-Serif;
                color: #111;
            }
            html,body {
                width: 100%;
                height: 100%;
                overflow-x: hidden;
                text-align: center;
                background-color: #fff;
            }
            header {
                background-color: #33f;
                padding: 4px;
            }
            header h1 {
                color: #0000;
                font-family: futura,Sans-Serif;
                font-size: 1.75rem;
                font-weight: 900;
                -webkit-text-stroke: 1px #fff;
                text-stroke: 1px #fff;
                text-align: left;
            }
            form {
                display: flex;
                padding: 5%;
                text-align: center;
                align-items: center;
            }
            #inputTask {
                width: 60%;
                height: 30px;
                margin: 2px;
                background-color: #fff;
                border: 1px solid #888;
                border-radius: 100vh;
                padding: 3px;
                font-size: 16px;
                caret-color: #111;
            }
            input:focus {
                outline: 2px solid #33f1;
            }
            button {
                width: 30%;
                height: 30px;
                margin: 2px;
                background-color: #33f;
                color: #fff;
                border: 1px solid #33f;
                border-radius: 100vh;
                transition-duration: .2s;
            }
            button:active {
                background-color: #88f;
            }
            #todolist {
                text-align: left;
                list-style: inside;
                padding: 5%;
                margin: 5%;
                border: 1px solid #888;
                border-radius: 10px;
                background-color: #f5f5f5;
            }
            #todolist li {
                padding-block: 10px;
                border-bottom: 1px solid #888;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>ToDoリスト</h1>
        </header>
        <form id="form">
            <input type="text" placeholder="YourTask" id="inputTask">
            <button type="button" id="AddTask" onclick="Add()">追加</button>
        </form>
        <h2>タスク</h2>
        <ul id="todolist">
            <li>Example<input type="checkbox"></li>
        </ul>
        <button type="button" onclick="Reset()">リセット</button>
        <script>
            let inputTask = document.getElementById("inputTask");
            let todolist = document.getElementById("todolist");
            
            function Add() {
                if (inputTask.value != "") {
                    let task = document.createElement("li");
                    task.textContent = inputTask.value;
                    let checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    todolist.appendChild(task);
                    task.appendChild(checkbox);
                }
                inputTask.value = "";
            }
            
            function Reset() {
                todolist.textContent = "";
            }
        </script>
    </body>
</html>
